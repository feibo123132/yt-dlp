name: Publish Desktop Download

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Verify project
        shell: pwsh
        run: |
          npm test
          node --check server.js
          node --check download-settings.js
          node --check ytdlp-args.js
          node --check electron/main.js

      - name: Build Windows desktop app
        run: npm run dist:win

      - name: Prepare Pages site
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $siteDir = "pages-site"
          $downloadDir = Join-Path $siteDir "downloads"
          New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null

          $exe = Get-ChildItem -LiteralPath "release" -Filter "LinkAudioExtractor-*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $exe) {
            throw "Desktop executable was not produced."
          }

          $desktopZip = Join-Path $downloadDir "link-audio-extractor-windows.zip"
          Compress-Archive -LiteralPath $exe.FullName -DestinationPath $desktopZip -Force

          Copy-Item -LiteralPath $exe.FullName -Destination (Join-Path $downloadDir "LinkAudioExtractor.exe") -Force

          $sha = $env:GITHUB_SHA.Substring(0, 7)
          $builtAt = Get-Date -Format "yyyy-MM-dd HH:mm:ss K"
          $index = @"
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Link Audio Extractor</title>
              <style>
                :root { color-scheme: light; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
                body { margin: 0; background: #f3f6fb; color: #172033; }
                main { max-width: 780px; margin: 56px auto; padding: 0 20px; }
                section { background: white; border: 1px solid #dbe3ef; border-radius: 8px; padding: 28px; box-shadow: 0 10px 30px rgba(14,35,68,.08); }
                h1 { margin: 0 0 12px; font-size: 28px; }
                p { line-height: 1.75; }
                a.button { display: inline-block; margin: 14px 10px 14px 0; padding: 12px 18px; border-radius: 6px; background: #0f62fe; color: white; text-decoration: none; font-weight: 700; }
                a.secondary { background: #334155; }
                code { background: #edf2f7; border-radius: 4px; padding: 2px 5px; }
                .meta { color: #64748b; font-size: 14px; }
              </style>
            </head>
            <body>
              <main>
                <section>
                  <h1>Link Audio Extractor</h1>
                  <p>Download the Windows desktop app, unzip it, then double-click the included executable. No terminal window or separate Node.js install is required for this desktop build.</p>
                  <p>
                    <a class="button" href="./downloads/link-audio-extractor-windows.zip">Download Windows ZIP</a>
                    <a class="button secondary" href="./downloads/LinkAudioExtractor.exe">Download EXE directly</a>
                  </p>
                  <p>The app includes the local UI, Node runtime through Electron, and bundled yt-dlp. MP3 export still requires ffmpeg on the user's computer unless a future build bundles ffmpeg too.</p>
                  <p class="meta">Build: $sha - $builtAt</p>
                </section>
              </main>
            </body>
          </html>
          "@

          Set-Content -LiteralPath (Join-Path $siteDir "index.html") -Value $index -Encoding UTF8

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

