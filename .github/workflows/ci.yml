name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        shell: pwsh
        run: npm test

      - name: Check syntax
        shell: pwsh
        run: |
          node --check server.js
          node --check download-settings.js
          node --check ytdlp-args.js
          node --check electron/main.js
